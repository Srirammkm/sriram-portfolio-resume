<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>LinkedIn Banner</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 1584px;
      height: 396px;
      overflow: hidden;
    }
    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #050505;
      color: #f5f5f5;
    }
  </style>
</head>
<body>
  <svg width="1584" height="396" viewBox="0 0 1584 396" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#0a0a0a"/>
        <stop offset="45%" stop-color="#060606"/>
        <stop offset="100%" stop-color="#0d1008"/>
      </linearGradient>
      <radialGradient id="glow1" cx="85%" cy="15%" r="55%">
        <stop offset="0%" stop-color="#f7ff61" stop-opacity="0.2"/>
        <stop offset="100%" stop-color="#f7ff61" stop-opacity="0"/>
      </radialGradient>
      <radialGradient id="glow2" cx="8%" cy="85%" r="45%">
        <stop offset="0%" stop-color="#f7ff61" stop-opacity="0.1"/>
        <stop offset="100%" stop-color="#f7ff61" stop-opacity="0"/>
      </radialGradient>
      <linearGradient id="accentBar" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#f7ff61" stop-opacity="0"/>
        <stop offset="35%" stop-color="#f7ff61" stop-opacity="0.9"/>
        <stop offset="100%" stop-color="#f7ff61" stop-opacity="0.15"/>
      </linearGradient>
      <linearGradient id="skillFill" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#f7ff61" stop-opacity="0.95"/>
        <stop offset="100%" stop-color="#c8d44a" stop-opacity="0.85"/>
      </linearGradient>
      <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
        <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
      </pattern>
      <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
        <circle cx="2" cy="2" r="1" fill="#f7ff61" opacity="0.12"/>
      </pattern>
      <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
        <feGaussianBlur stdDeviation="4" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <clipPath id="textCol">
        <rect x="360" y="0" width="560" height="396"/>
      </clipPath>
      <clipPath id="skillsPanel">
        <rect x="0" y="0" width="400" height="316" rx="16"/>
      </clipPath>
    </defs>

    <!-- Background layers -->
    <rect width="1584" height="396" fill="url(#bgGrad)"/>
    <rect width="1584" height="396" fill="url(#grid)"/>
    <rect width="1584" height="396" fill="url(#dots)"/>
    <rect width="1584" height="396" fill="url(#glow1)"/>
    <rect width="1584" height="396" fill="url(#glow2)"/>

    <!-- Diagonal accent slice -->
    <path d="M 0 396 L 0 280 L 280 0 L 0 0 Z" fill="#f7ff61" opacity="0.04"/>
    <path d="M 1584 0 L 1584 120 L 1280 396 L 1584 396 Z" fill="#f7ff61" opacity="0.03"/>

    <!-- Left decorative orbit rings -->
    <g opacity="0.35" filter="url(#glow)">
      <circle cx="120" cy="198" r="72" fill="none" stroke="#f7ff61" stroke-width="1" opacity="0.25"/>
      <circle cx="120" cy="198" r="48" fill="none" stroke="#f7ff61" stroke-width="1" opacity="0.18"/>
      <circle cx="120" cy="198" r="6" fill="#f7ff61" opacity="0.7"/>
      <circle cx="192" cy="198" r="4" fill="#f7ff61" opacity="0.5"/>
      <line x1="126" y1="198" x2="188" y2="198" stroke="#f7ff61" stroke-width="1.5" opacity="0.4"/>
    </g>

    <!-- ── LEFT: Identity ── -->
    <g clip-path="url(#textCol)">
      <text x="380" y="96" fill="#f7ff61" font-family="Courier New, monospace" font-size="13" font-weight="600" letter-spacing="2">PLATFORM · RELIABILITY · AUTOMATION</text>

      <text x="380" y="142" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="40" font-weight="700" letter-spacing="-0.5">Platform Engineer</text>
      <text x="380" y="176" fill="#d4d4d4" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="600">DevOps · SRE · Systems Architecture</text>

      <rect x="380" y="192" width="480" height="3" rx="1.5" fill="url(#accentBar)"/>

      <text x="380" y="224" fill="#a3a3a3" font-family="Arial, Helvetica, sans-serif" font-size="19">Self-service platforms · ChatOps · governed change</text>
      <text x="380" y="252" fill="#a3a3a3" font-family="Arial, Helvetica, sans-serif" font-size="19">AWS · Azure · GCP · Kubernetes · Temporal</text>

      <text x="380" y="310" fill="#f7ff61" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700">sriram.manikanth.info</text>
      <rect x="380" y="324" width="132" height="28" rx="14" fill="rgba(247,255,97,0.08)" stroke="rgba(247,255,97,0.35)" stroke-width="1"/>
      <text x="396" y="342" fill="#e5e5e5" font-family="Arial, sans-serif" font-size="12" font-weight="600">MTS · Salesforce</text>
      <rect x="512" y="324" width="96" height="28" rx="14" fill="rgba(255,255,255,0.04)" stroke="#333" stroke-width="1"/>
      <text x="528" y="342" fill="#e5e5e5" font-family="Arial, sans-serif" font-size="12" font-weight="600">5.5+ years</text>
    </g>

    <!-- ── RIGHT: Skills matrix panel ── -->
    <g transform="translate(1020, 36)">
      <rect width="400" height="324" rx="16" fill="#0c0c0c" stroke="#2a2a2a" stroke-width="1"/>
      <rect width="400" height="324" rx="16" fill="url(#glow1)" opacity="0.35"/>

      <!-- Header strip -->
      <rect width="400" height="48" rx="16" fill="#111111"/>
      <rect y="32" width="400" height="16" fill="#111111"/>
      <circle cx="24" cy="24" r="5" fill="#22c55e"/>
      <text x="40" y="29" fill="#a3a3a3" font-family="Courier New, monospace" font-size="12" letter-spacing="0.5">CORE STACK</text>
      <line x1="0" y1="48" x2="400" y2="48" stroke="#262626"/>

      <g clip-path="url(#skillsPanel)" transform="translate(0, 0)">
        <g transform="translate(20, 64)">
          <!-- Row labels + skill pills -->
          <text y="0" fill="#737373" font-family="Arial, sans-serif" font-size="11" font-weight="600" letter-spacing="1">DEVOPS &amp; SRE</text>
          <g transform="translate(0, 10)">
            <rect width="88" height="28" rx="8" fill="rgba(247,255,97,0.12)" stroke="rgba(247,255,97,0.45)" stroke-width="1"/>
            <text x="14" y="19" fill="#f7ff61" font-family="Arial, sans-serif" font-size="12" font-weight="600">CI/CD</text>
            <rect x="96" width="72" height="28" rx="8" fill="#141414" stroke="#333" stroke-width="1"/>
            <text x="110" y="19" fill="#e5e5e5" font-family="Arial, sans-serif" font-size="12">GitOps</text>
            <rect x="180" width="64" height="28" rx="8" fill="#141414" stroke="#333" stroke-width="1"/>
            <text x="194" y="19" fill="#e5e5e5" font-family="Arial, sans-serif" font-size="12">SRE</text>
            <rect x="252" width="88" height="28" rx="8" fill="#141414" stroke="#333" stroke-width="1"/>
            <text x="266" y="19" fill="#e5e5e5" font-family="Arial, sans-serif" font-size="12">ChatOps</text>
          </g>

          <text y="58" fill="#737373" font-family="Arial, sans-serif" font-size="11" font-weight="600" letter-spacing="1">CLOUD &amp; PLATFORM</text>
          <g transform="translate(0, 68)">
            <rect width="56" height="28" rx="8" fill="rgba(247,255,97,0.12)" stroke="rgba(247,255,97,0.45)" stroke-width="1"/>
            <text x="14" y="19" fill="#f7ff61" font-family="Arial, sans-serif" font-size="12" font-weight="600">K8s</text>
            <rect x="64" width="56" height="28" rx="8" fill="#141414" stroke="#333" stroke-width="1"/>
            <text x="78" y="19" fill="#e5e5e5" font-family="Arial, sans-serif" font-size="12">AWS</text>
            <rect x="128" width="58" height="28" rx="8" fill="#141414" stroke="#333" stroke-width="1"/>
            <text x="138" y="19" fill="#e5e5e5" font-family="Arial, sans-serif" font-size="12">Azure</text>
            <rect x="186" width="52" height="28" rx="8" fill="#141414" stroke="#333" stroke-width="1"/>
            <text x="198" y="19" fill="#e5e5e5" font-family="Arial, sans-serif" font-size="12">GCP</text>
            <rect x="252" width="88" height="28" rx="8" fill="#141414" stroke="#333" stroke-width="1"/>
            <text x="262" y="19" fill="#e5e5e5" font-family="Arial, sans-serif" font-size="12">Terraform</text>
          </g>

          <text y="116" fill="#737373" font-family="Arial, sans-serif" font-size="11" font-weight="600" letter-spacing="1">AI &amp; AUTOMATION</text>
          <g transform="translate(0, 126)">
            <rect width="52" height="28" rx="8" fill="rgba(247,255,97,0.12)" stroke="rgba(247,255,97,0.45)" stroke-width="1"/>
            <text x="12" y="19" fill="#f7ff61" font-family="Arial, sans-serif" font-size="12" font-weight="600">LLMs</text>
            <rect x="60" width="88" height="28" rx="8" fill="#141414" stroke="#333" stroke-width="1"/>
            <text x="74" y="19" fill="#e5e5e5" font-family="Arial, sans-serif" font-size="12">Temporal</text>
            <rect x="156" width="72" height="28" rx="8" fill="#141414" stroke="#333" stroke-width="1"/>
            <text x="168" y="19" fill="#e5e5e5" font-family="Arial, sans-serif" font-size="12">Python</text>
            <rect x="228" width="72" height="28" rx="8" fill="#141414" stroke="#333" stroke-width="1"/>
            <text x="240" y="19" fill="#e5e5e5" font-family="Arial, sans-serif" font-size="12">Bash</text>
          </g>

          <!-- Impact bars (visual, no project names) -->
          <text y="178" fill="#737373" font-family="Arial, sans-serif" font-size="11" font-weight="600" letter-spacing="1">IMPACT</text>
          <g transform="translate(0, 188)">
            <text y="12" fill="#a3a3a3" font-family="Arial, sans-serif" font-size="11">Automation coverage</text>
            <rect y="18" width="360" height="6" rx="3" fill="#1a1a1a"/>
            <rect y="18" width="288" height="6" rx="3" fill="url(#skillFill)"/>
            <text x="348" y="24" fill="#f7ff61" font-family="Arial, sans-serif" font-size="10" font-weight="700">80%</text>

            <text y="44" fill="#a3a3a3" font-family="Arial, sans-serif" font-size="11">Release velocity</text>
            <rect y="50" width="360" height="6" rx="3" fill="#1a1a1a"/>
            <rect y="50" width="216" height="6" rx="3" fill="url(#skillFill)" opacity="0.85"/>
            <text x="348" y="56" fill="#f7ff61" font-family="Arial, sans-serif" font-size="10" font-weight="700">+50%</text>
          </g>
        </g>
      </g>

      <!-- Corner logo -->
      <g transform="translate(352, 8)">
        <rect width="40" height="40" rx="9" fill="rgba(247,255,97,0.08)" stroke="rgba(247,255,97,0.35)" stroke-width="1.2"/>
        <rect x="11" y="11" width="7" height="7" rx="1.5" fill="none" stroke="#f7ff61" stroke-width="1.5"/>
        <rect x="22" y="22" width="7" height="7" rx="1.5" fill="none" stroke="#f7ff61" stroke-width="1.5"/>
        <path d="M14.5 22V23.5C14.5 24.3 15.2 25 16 25H17.5" stroke="#f7ff61" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M27.5 19V17.5C27.5 16.7 26.8 16 26 16H24.5" stroke="#f7ff61" stroke-width="1.5" stroke-linecap="round"/>
      </g>
    </g>

    <!-- Floating accent nodes -->
    <circle cx="990" cy="72" r="3" fill="#f7ff61" opacity="0.5"/>
    <circle cx="1008" cy="340" r="2.5" fill="#f7ff61" opacity="0.35"/>
    <circle cx="1448" cy="48" r="2" fill="#f7ff61" opacity="0.4"/>
  </svg>
</body>
</html>
