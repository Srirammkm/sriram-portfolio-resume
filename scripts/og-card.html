<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>OG Card</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
    }
    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #080808;
      color: #f5f5f5;
    }
    .card {
      position: relative;
      width: 1200px;
      height: 630px;
      padding: 56px 72px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      background:
        radial-gradient(ellipse 80% 60% at 100% 0%, rgba(247, 255, 97, 0.14), transparent 55%),
        radial-gradient(ellipse 50% 40% at 0% 100%, rgba(247, 255, 97, 0.06), transparent 50%),
        #080808;
      border: 1px solid #1f1f1f;
    }
    .grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
    }
    .top {
      display: flex;
      align-items: center;
      gap: 20px;
      z-index: 1;
    }
    .logo {
      width: 56px;
      height: 56px;
      border-radius: 10px;
      border: 1px solid rgba(247, 255, 97, 0.35);
      background: rgba(247, 255, 97, 0.08);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .logo svg { display: block; }
    .handle {
      font-family: "Courier New", Courier, monospace;
      font-size: 22px;
      color: #a3a3a3;
      letter-spacing: 0.02em;
    }
    .handle strong { color: #f7ff61; }
    .main {
      z-index: 1;
      max-width: 920px;
    }
    h1 {
      font-size: 64px;
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.05;
      margin-bottom: 18px;
    }
    .roles {
      font-size: 28px;
      font-weight: 600;
      color: #e5e5e5;
      margin-bottom: 14px;
    }
    .tags {
      font-size: 22px;
      color: #a3a3a3;
      line-height: 1.4;
    }
    .tags span {
      color: #f7ff61;
    }
    .bottom {
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-top: 1px solid #262626;
      padding-top: 28px;
    }
    .url {
      font-size: 26px;
      font-weight: 700;
      color: #f7ff61;
      letter-spacing: 0.01em;
    }
    .badge {
      font-size: 18px;
      font-weight: 600;
      color: #d4d4d4;
      padding: 10px 18px;
      border: 1px solid #333;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.04);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="grid" aria-hidden="true"></div>
    <div class="top">
      <div class="logo" aria-hidden="true">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="3" y="3" width="8" height="8" rx="2" stroke="#f7ff61" stroke-width="2"/>
          <rect x="13" y="13" width="8" height="8" rx="2" stroke="#f7ff61" stroke-width="2"/>
          <path d="M7 13V15C7 16.1046 7.89543 17 9 17H11" stroke="#f7ff61" stroke-width="2" stroke-linecap="round"/>
          <path d="M17 11V9C17 7.89543 16.1046 7 15 7H13" stroke="#f7ff61" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>
      <p class="handle"><strong>sriram.m</strong> / platform_ops</p>
    </div>
    <div class="main">
      <h1>Sriram Manikanth</h1>
      <p class="roles">Platform Engineer · DevOps · SRE</p>
      <p class="tags"><span>ChatOps</span> · Temporal · Self-service platforms · Interactive production demos</p>
    </div>
    <div class="bottom">
      <span class="url">sriram.manikanth.info</span>
      <span class="badge">5.5+ years · Salesforce · Informatica</span>
    </div>
  </div>
</body>
</html>
